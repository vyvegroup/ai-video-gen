name: Deploy AI Video Gen

on:
  workflow_dispatch:
    inputs:
      resolution:
        description: 'Resolution preset'
        required: false
        default: '256'
        type: choice
        options:
          - '256'
          - '512'
          - '576'
      num_frames:
        description: 'Number of frames'
        required: false
        default: '8'
        type: choice
        options:
          - '4'
          - '8'
          - '14'
          - '16'
      num_steps:
        description: 'Inference steps'
        required: false
        default: '10'
        type: choice
        options:
          - '5'
          - '10'
          - '15'
          - '20'
      model:
        description: 'Model to download'
        required: false
        default: 'cerspense/zeroscope_v2_576w'
        type: choice
        options:
          - 'cerspense/zeroscope_v2_576w'
          - 'cerspense/zeroscope_v2_XL'
          - 'stabilityai/stable-video-diffusion-img2vid-xt'
          - 'stabilityai/stable-video-diffusion-img2vid'

env:
  NGROK_AUTH_TOKEN: ${{ secrets.NGROK_AUTH_TOKEN }}
  GH_PAT: ${{ secrets.GITHUB_TOKEN }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-cpu-v3-${{ hashFiles('requirements-cpu.txt') }}
          restore-keys: pip-cpu-v3-

      - name: Cache HuggingFace models
        uses: actions/cache@v4
        with:
          path: ./models
          key: models-${{ inputs.model }}-v2
          restore-keys: |
            models-${{ inputs.model }}-
            models-

      - name: Install PyTorch CPU
        run: |
          pip install torch torchvision torchaudio --index-url https://download.pytorch.org/whl/cpu
          echo "PyTorch CPU installed"
          python -c "import torch; print(f'PyTorch {torch.__version__}, CUDA: {torch.cuda.is_available()}')"

      - name: Install dependencies
        run: pip install -r requirements-cpu.txt

      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Download video model
        env:
          HF_HOME: /tmp/hf_cache
          TRANSFORMERS_CACHE: /tmp/hf_cache
        run: |
          MODEL_ID="${{ inputs.model }}"
          MODEL_DIR="./models/$(echo $MODEL_ID | tr '/' '_')"

          if [ -d "$MODEL_DIR" ] && [ -f "$MODEL_DIR/model_index.json" ]; then
            echo "Model already cached at $MODEL_DIR"
          else
            echo "Downloading model: $MODEL_ID"
            echo "Disk free before download:"
            df -h /tmp
            python -c "
          from huggingface_hub import snapshot_download
          import os
          model_id = '$MODEL_ID'
          safe_name = model_id.replace('/', '_')
          path = f'./models/{safe_name}'
          os.makedirs(path, exist_ok=True)
          snapshot_download(
              repo_id=model_id,
              local_dir=path,
              local_dir_use_symlinks=False,
          )
          print(f'Model downloaded to {path}')
          "
          fi

          echo "Model directory contents:"
          ls -la "$MODEL_DIR" | head -20

      - name: Download chat model (Qwen2.5-0.5B)
        env:
          HF_HOME: /tmp/hf_cache
          TRANSFORMERS_CACHE: /tmp/hf_cache
        run: |
          CHAT_DIR="./models/chat-model"
          if [ -d "$CHAT_DIR" ] && [ -f "$CHAT_DIR/config.json" ]; then
            echo "Chat model already cached"
          else
            echo "Downloading Qwen2.5-0.5B-Instruct..."
            python -c "
          from huggingface_hub import snapshot_download
          import os
          path = './models/chat-model'
          os.makedirs(path, exist_ok=True)
          snapshot_download(
              repo_id='Qwen/Qwen2.5-0.5B-Instruct',
              local_dir=path,
              local_dir_use_symlinks=False,
          )
          print('Chat model downloaded')
          "
          fi

      - name: Create state directories
        run: mkdir -p ./state/chats ./outputs ./uploads

      - name: Start FastAPI server
        env:
          DEVICE: cpu
          DEFAULT_NUM_FRAMES: ${{ inputs.num_frames }}
          DEFAULT_NUM_INFERENCE_STEPS: ${{ inputs.num_steps }}
          DEFAULT_WIDTH: ${{ inputs.resolution }}
          DEFAULT_HEIGHT: ${{ inputs.resolution }}
          ALLOW_NSFW: "true"
          HF_HOME: /tmp/hf_cache
        run: |
          echo "Starting server on port 8000..."
          python -m uvicorn app.main:app --host 0.0.0.0 --port 8000 &
          SERVER_PID=$!
          echo "Server PID: $SERVER_PID"

          # Wait for server to be ready
          echo "Waiting for server..."
          for i in $(seq 1 60); do
            if curl -s http://localhost:8000/api/system/health > /dev/null 2>&1; then
              echo "Server is ready!"
              break
            fi
            if ! kill -0 $SERVER_PID 2>/dev/null; then
              echo "Server crashed! Checking logs..."
              wait $SERVER_PID 2>/dev/null || true
              exit 1
            fi
            echo "  Waiting... ($i/60)"
            sleep 2
          done

          # Final check
          if ! curl -s http://localhost:8000/api/system/health > /dev/null 2>&1; then
            echo "Server failed to start"
            exit 1
          fi

          echo "SERVER_PID=$SERVER_PID" >> $GITHUB_ENV

      - name: Start ngrok tunnel
        run: |
          pip install pyngrok
          python -c "
          from pyngrok import ngrok
          import json, os, time

          token = os.environ.get('NGROK_AUTH_TOKEN', '')
          if token:
              ngrok.set_auth_token(token)
              print('Using ngrok auth token (free account)')
          else:
              print('WARNING: No NGROK_AUTH_TOKEN set! Using unauthenticated ngrok.')

          # Start tunnel with options to handle free tier
          tunnel = ngrok.connect(
              8000,
              bind_tls=True,
              options={
                  'request_header_add': 'ngrok-skip-browser-warning: 1',
                  'compression': False,
              }
          )
          url = tunnel.public_url
          print(f'NGROK_URL={url}')

          # Save URL to env
          with open(os.environ['GITHUB_ENV'], 'a') as f:
              f.write(f'NGROK_URL={url}\n')
              f.write(f'NGROK_TUNNEL_ID={tunnel.api_request.public_url.split(\"//\")[1].split(\".\")[0]}\n')

          print(f'Public URL: {url}')

          # Verify tunnel works
          import urllib.request
          for attempt in range(10):
              try:
                  req = urllib.request.Request(
                      f'{url}/api/system/health',
                      headers={'ngrok-skip-browser-warning': '1'}
                  )
                  resp = urllib.request.urlopen(req, timeout=10)
                  data = resp.read().decode()
                  print(f'Tunnel verified: {data}')
                  break
              except Exception as e:
                  print(f'Tunnel check {attempt+1}/10 failed: {e}')
                  time.sleep(2)
          else:
              print('WARNING: Could not verify tunnel')
          "

      - name: Show access URL
        run: |
          echo "=============================================="
          echo "  🎬 AI Video Generator is LIVE"
          echo "=============================================="
          echo ""
          echo "  🌐 URL: ${{ env.NGROK_URL }}"
          echo ""
          echo "  ⚙️  Config:"
          echo "     Resolution: ${{ inputs.resolution }}x${{ inputs.resolution }}"
          echo "     Frames: ${{ inputs.num_frames }}"
          echo "     Steps: ${{ inputs.num_steps }}"
          echo "     Model: ${{ inputs.model }}"
          echo ""
          echo "=============================================="

      - name: Keep alive
        run: |
          # Use shell variables (not GITHUB_ENV) so PID updates work correctly
          SERVER_PID=${{ env.SERVER_PID }}
          NGROK_URL="${{ env.NGROK_URL }}"
          DEVICE="cpu"
          DEFAULT_NUM_FRAMES="${{ inputs.num_frames }}"
          DEFAULT_NUM_INFERENCE_STEPS="${{ inputs.num_steps }}"
          DEFAULT_WIDTH="${{ inputs.resolution }}"
          DEFAULT_HEIGHT="${{ inputs.resolution }}"
          ALLOW_NSFW="true"
          HF_HOME="/tmp/hf_cache"

          export DEVICE DEFAULT_NUM_FRAMES DEFAULT_NUM_INFERENCE_STEPS DEFAULT_WIDTH DEFAULT_HEIGHT ALLOW_NSFW HF_HOME

          echo "Keeping server alive for 6 hours..."
          echo "Server PID: $SERVER_PID"
          echo "URL: $NGROK_URL"

          # Check every 60 seconds
          TIMEOUT=21600  # 6 hours
          ELAPSED=0
          while [ $ELAPSED -lt $TIMEOUT ]; do
            sleep 60
            ELAPSED=$((ELAPSED + 60))

            # Check if server is still running
            if ! kill -0 $SERVER_PID 2>/dev/null; then
              echo "Server process died at $((ELAPSED/60)) minutes"
              exit 1
            fi

            # Local health check
            if ! curl -sf http://localhost:8000/api/system/health > /dev/null 2>&1; then
              echo "Health check failed at $((ELAPSED/60)) minutes, restarting..."
              kill $SERVER_PID 2>/dev/null || true
              sleep 2
              python -m uvicorn app.main:app --host 0.0.0.0 --port 8000 &
              SERVER_PID=$!
              echo "Restarted server with new PID: $SERVER_PID"
              sleep 5
            fi

            # Check ngrok tunnel is still alive
            if ! curl -sf -H "ngrok-skip-browser-warning: 1" "$NGROK_URL/api/system/health" > /dev/null 2>&1; then
              echo "ngrok tunnel down at $((ELAPSED/60)) minutes, reconnecting..."
              python -c "
          from pyngrok import ngrok
          import os
          token = os.environ.get('NGROK_AUTH_TOKEN', '')
          if token:
              ngrok.set_auth_token(token)
          # Kill all existing tunnels
          tunnels = ngrok.get_tunnels()
          for t in tunnels:
              try:
                  ngrok.disconnect(t.public_url)
              except:
                  pass
          # Reconnect
          tunnel = ngrok.connect(8000, bind_tls=True)
          url = tunnel.public_url
          print(f'New ngrok URL: {url}')
          # Write to file and read back (shell variable update)
          with open('/tmp/ngrok_url.txt', 'w') as f:
              f.write(url)
          "
              sleep 3
              # Read new URL if reconnected
              if [ -f /tmp/ngrok_url.txt ]; then
                NGROK_URL=$(cat /tmp/ngrok_url.txt)
                echo "ngrok reconnected: $NGROK_URL"
              fi
            fi

            if [ $((ELAPSED % 300)) -eq 0 ]; then
              echo "Still alive at $((ELAPSED/60)) minutes | URL: $NGROK_URL | PID: $SERVER_PID"
            fi
          done

          echo "Timeout reached (6 hours)"
