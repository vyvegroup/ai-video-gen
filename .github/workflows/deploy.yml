name: Deploy AI Video Gen

on:
  workflow_dispatch:
    inputs:
      resolution:
        description: 'Resolution preset'
        required: false
        default: '256'
        type: choice
        options:
          - '256'
          - '512'
          - '576'
      num_frames:
        description: 'Number of frames'
        required: false
        default: '8'
        type: choice
        options:
          - '4'
          - '8'
          - '14'
          - '16'
      num_steps:
        description: 'Inference steps'
        required: false
        default: '10'
        type: choice
        options:
          - '5'
          - '10'
          - '15'
          - '20'
      model:
        description: 'Model to download'
        required: false
        default: 'cerspense/zeroscope_v2_576w'
        type: choice
        options:
          - 'cerspense/zeroscope_v2_576w'
          - 'cerspense/zeroscope_v2_XL'
          - 'stabilityai/stable-video-diffusion-img2vid-xt'
          - 'stabilityai/stable-video-diffusion-img2vid'

env:
  NGROK_AUTH_TOKEN: ${{ secrets.NGROK_AUTH_TOKEN }}
  GH_PAT: ${{ secrets.GITHUB_TOKEN }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-cpu-v3-${{ hashFiles('requirements-cpu.txt') }}
          restore-keys: pip-cpu-v3-

      - name: Cache HuggingFace models
        uses: actions/cache@v4
        with:
          path: ./models
          key: models-${{ inputs.model }}-v2
          restore-keys: |
            models-${{ inputs.model }}-
            models-

      - name: Install PyTorch CPU
        run: |
          pip install torch torchvision torchaudio --index-url https://download.pytorch.org/whl/cpu
          echo "PyTorch CPU installed"
          python -c "import torch; print(f'PyTorch {torch.__version__}, CUDA: {torch.cuda.is_available()}')"

      - name: Install dependencies
        run: pip install -r requirements-cpu.txt

      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Download video model
        env:
          HF_HOME: /tmp/hf_cache
          TRANSFORMERS_CACHE: /tmp/hf_cache
        run: |
          MODEL_ID="${{ inputs.model }}"
          MODEL_DIR="./models/$(echo $MODEL_ID | tr '/' '_')"

          if [ -d "$MODEL_DIR" ] && [ -f "$MODEL_DIR/model_index.json" ]; then
            echo "Model already cached at $MODEL_DIR"
          else
            echo "Downloading model: $MODEL_ID"
            echo "Disk free before download:"
            df -h /tmp
            python -c "
          from huggingface_hub import snapshot_download
          import os
          model_id = '$MODEL_ID'
          safe_name = model_id.replace('/', '_')
          path = f'./models/{safe_name}'
          os.makedirs(path, exist_ok=True)
          snapshot_download(
              repo_id=model_id,
              local_dir=path,
              local_dir_use_symlinks=False,
          )
          print(f'Model downloaded to {path}')
          "
          fi

          echo "Model directory contents:"
          ls -la "$MODEL_DIR" | head -20

      - name: Download chat model (Qwen2.5-0.5B)
        env:
          HF_HOME: /tmp/hf_cache
          TRANSFORMERS_CACHE: /tmp/hf_cache
        run: |
          CHAT_DIR="./models/chat-model"
          if [ -d "$CHAT_DIR" ] && [ -f "$CHAT_DIR/config.json" ]; then
            echo "Chat model already cached"
          else
            echo "Downloading Qwen2.5-0.5B-Instruct..."
            python -c "
          from huggingface_hub import snapshot_download
          import os
          path = './models/chat-model'
          os.makedirs(path, exist_ok=True)
          snapshot_download(
              repo_id='Qwen/Qwen2.5-0.5B-Instruct',
              local_dir=path,
              local_dir_use_symlinks=False,
          )
          print('Chat model downloaded')
          "
          fi

      - name: Create state directories
        run: mkdir -p ./state/chats ./outputs ./uploads

      - name: Start FastAPI server
        env:
          DEVICE: cpu
          DEFAULT_NUM_FRAMES: ${{ inputs.num_frames }}
          DEFAULT_NUM_INFERENCE_STEPS: ${{ inputs.num_steps }}
          DEFAULT_WIDTH: ${{ inputs.resolution }}
          DEFAULT_HEIGHT: ${{ inputs.resolution }}
          ALLOW_NSFW: "true"
          HF_HOME: /tmp/hf_cache
        run: |
          echo "Starting server on port 8000..."
          python -m uvicorn app.main:app --host 0.0.0.0 --port 8000 &
          SERVER_PID=$!
          echo "Server PID: $SERVER_PID"

          # Wait for server to be ready
          echo "Waiting for server..."
          for i in $(seq 1 60); do
            if curl -s http://localhost:8000/api/system/health > /dev/null 2>&1; then
              echo "Server is ready!"
              break
            fi
            if ! kill -0 $SERVER_PID 2>/dev/null; then
              echo "Server crashed! Checking logs..."
              wait $SERVER_PID 2>/dev/null || true
              exit 1
            fi
            echo "  Waiting... ($i/60)"
            sleep 2
          done

          # Final check
          if ! curl -s http://localhost:8000/api/system/health > /dev/null 2>&1; then
            echo "Server failed to start"
            exit 1
          fi

          echo "SERVER_PID=$SERVER_PID" >> $GITHUB_ENV

      - name: Start ngrok tunnel
        run: |
          # Download ngrok binary directly (more reliable than pyngrok)
          curl -sL https://bin.equinox.io/c/bNyj1mQVY4c/ngrok-v3-stable-linux-amd64.tgz -o /tmp/ngrok.tgz
          tar -xzf /tmp/ngrok.tgz -C /tmp/
          chmod +x /tmp/ngrok
          echo "ngrok binary downloaded"

          # Configure auth token if available
          if [ -n "$NGROK_AUTH_TOKEN" ]; then
            /tmp/ngrok config add-authtoken "$NGROK_AUTH_TOKEN"
            echo "ngrok auth token configured"
          else
            echo "WARNING: No NGROK_AUTH_TOKEN set! Tunnel may show warning page."
          fi

          # Start ngrok in background
          /tmp/ngrok http 8000 --log=stdout --log-format=logfmt > /tmp/ngrok.log 2>&1 &
          NGROK_PID=$!
          echo "ngrok started with PID: $NGROK_PID"

          # Wait for tunnel to establish
          sleep 3

          # Get the public URL from ngrok API
          for attempt in $(seq 1 15); do
            NGROK_URL=$(curl -sf http://127.0.0.1:4040/api/tunnels 2>/dev/null | python3 -c "
          import json, sys
          try:
              data = json.load(sys.stdin)
              tunnels = data.get('tunnels', [])
              for t in tunnels:
                  if t.get('public_url', '').startswith('https'):
                      print(t['public_url'])
                      break
          except:
              pass
          " 2>/dev/null)

            if [ -n "$NGROK_URL" ]; then
              echo "ngrok tunnel established: $NGROK_URL"
              break
            fi
            echo "  Waiting for tunnel... ($attempt/15)"
            sleep 2
          done

          if [ -z "$NGROK_URL" ]; then
            echo "ERROR: ngrok tunnel failed to start!"
            echo "--- ngrok log ---"
            cat /tmp/ngrok.log | tail -30
            exit 1
          fi

          # Save URL
          echo "NGROK_URL=$NGROK_URL" >> $GITHUB_ENV

          # Verify tunnel actually works (through ngrok)
          for attempt in $(seq 1 10); do
            HTTP_CODE=$(curl -sf -o /dev/null -w "%{http_code}" -H "ngrok-skip-browser-warning: 1" "$NGROK_URL/api/system/health" 2>/dev/null)
            if [ "$HTTP_CODE" = "200" ]; then
              echo "Tunnel verified OK (HTTP 200)"
              break
            fi
            echo "  Tunnel verification attempt $attempt/10 (HTTP $HTTP_CODE)"
            sleep 2
          done

          echo "--- ngrok log (last 10 lines) ---"
          tail -10 /tmp/ngrok.log

      - name: Show access URL
        run: |
          echo "=============================================="
          echo "  🎬 AI Video Generator is LIVE"
          echo "=============================================="
          echo ""
          echo "  🌐 URL: ${{ env.NGROK_URL }}"
          echo ""
          echo "  ⚙️  Config:"
          echo "     Resolution: ${{ inputs.resolution }}x${{ inputs.resolution }}"
          echo "     Frames: ${{ inputs.num_frames }}"
          echo "     Steps: ${{ inputs.num_steps }}"
          echo "     Model: ${{ inputs.model }}"
          echo ""
          echo "=============================================="

      - name: Keep alive
        run: |
          # Use shell variables (not GITHUB_ENV) so PID updates work correctly
          SERVER_PID=${{ env.SERVER_PID }}
          NGROK_URL="${{ env.NGROK_URL }}"
          DEVICE="cpu"
          DEFAULT_NUM_FRAMES="${{ inputs.num_frames }}"
          DEFAULT_NUM_INFERENCE_STEPS="${{ inputs.num_steps }}"
          DEFAULT_WIDTH="${{ inputs.resolution }}"
          DEFAULT_HEIGHT="${{ inputs.resolution }}"
          ALLOW_NSFW="true"
          HF_HOME="/tmp/hf_cache"

          export DEVICE DEFAULT_NUM_FRAMES DEFAULT_NUM_INFERENCE_STEPS DEFAULT_WIDTH DEFAULT_HEIGHT ALLOW_NSFW HF_HOME

          echo "Keeping server alive for 6 hours..."
          echo "Server PID: $SERVER_PID"
          echo "URL: $NGROK_URL"

          # Check every 60 seconds
          TIMEOUT=21600  # 6 hours
          ELAPSED=0
          while [ $ELAPSED -lt $TIMEOUT ]; do
            sleep 60
            ELAPSED=$((ELAPSED + 60))

            # Check if server is still running
            if ! kill -0 $SERVER_PID 2>/dev/null; then
              echo "Server process died at $((ELAPSED/60)) minutes"
              exit 1
            fi

            # Local health check
            if ! curl -sf http://localhost:8000/api/system/health > /dev/null 2>&1; then
              echo "Health check failed at $((ELAPSED/60)) minutes, restarting..."
              kill $SERVER_PID 2>/dev/null || true
              sleep 2
              python -m uvicorn app.main:app --host 0.0.0.0 --port 8000 &
              SERVER_PID=$!
              echo "Restarted server with new PID: $SERVER_PID"
              sleep 5
            fi

            # Check ngrok tunnel is still alive
            if ! curl -sf -H "ngrok-skip-browser-warning: 1" "$NGROK_URL/api/system/health" > /dev/null 2>&1; then
              echo "ngrok tunnel down at $((ELAPSED/60)) minutes, reconnecting..."
              # Kill old ngrok processes
              pkill -f "/tmp/ngrok" 2>/dev/null || true
              sleep 2
              # Restart ngrok
              /tmp/ngrok http 8000 --log=stdout --log-format=logfmt > /tmp/ngrok.log 2>&1 &
              sleep 5
              # Get new URL from ngrok API
              NEW_URL=$(curl -sf http://127.0.0.1:4040/api/tunnels 2>/dev/null | python3 -c "
          import json, sys
          try:
              data = json.load(sys.stdin)
              for t in data.get('tunnels', []):
                  if t.get('public_url', '').startswith('https'):
                      print(t['public_url'])
                      break
          except:
              pass
          " 2>/dev/null)
              if [ -n "$NEW_URL" ]; then
                NGROK_URL=$NEW_URL
                echo "ngrok reconnected: $NGROK_URL"
              else
                echo "WARNING: ngrok reconnect failed"
              fi
            fi

            if [ $((ELAPSED % 300)) -eq 0 ]; then
              echo "Still alive at $((ELAPSED/60)) minutes | URL: $NGROK_URL | PID: $SERVER_PID"
            fi
          done

          echo "Timeout reached (6 hours)"
