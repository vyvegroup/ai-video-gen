# =============================================================================
# AI Video Generator - GitHub Actions (GitHub-Hosted Runner)
# =============================================================================
# Runs on ubuntu-latest (CPU only, 7GB RAM, 14GB disk)
#
# SETUP:
#   Secrets: NGROK_AUTH_TOKEN (required), HUGGINGFACE_TOKEN (optional)
#   Variables: DEFAULT_MODEL (optional)
# =============================================================================

name: 🎬 Deploy AI Video Generator

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'LICENSE'
  workflow_dispatch:
    inputs:
      model_url:
        description: 'Model (HuggingFace ID or direct URL like https://civarchive.com/...)'
        required: false
        default: 'cerspense/zeroscope_v2_576w'
      model_source:
        description: 'Model source'
        required: false
        default: 'huggingface'
        type: choice
        options:
          - huggingface
          - url
      allow_nsfw:
        description: 'Allow NSFW content'
        required: false
        default: true
        type: boolean
      resolution:
        description: 'Resolution preset'
        required: false
        default: 'low'
        type: choice
        options:
          - low
          - medium
          - high

env:
  PORT: "8000"
  PYTHON_VERSION: '3.11'
  ALLOW_NSFW: ${{ github.event.inputs.allow_nsfw || 'true' }}

jobs:
  deploy:
    name: 🚀 Deploy (GitHub Runner)
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      # ---- Checkout ----
      - name: 📦 Checkout
        uses: actions/checkout@v4

      # ---- System deps ----
      - name: 🎬 Install system deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq ffmpeg jq
          ffmpeg -version 2>&1 | head -1
          jq --version

      # ---- Python ----
      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      # ---- Python deps ----
      - name: 📦 Install Python deps
        run: |
          pip install torch torchvision torchaudio --index-url https://download.pytorch.org/whl/cpu
          pip install -r requirements-cpu.txt
          echo "Done: $(pip list | grep -cE 'torch|diffusers|fastapi') packages"

      # ---- Model cache key ----
      - name: 🗂️ Cache key
        id: cache-key
        run: |
          MID="${{ github.event.inputs.model_url || vars.DEFAULT_MODEL || 'cerspense/zeroscope_v2_576w' }}"
          SAFE=$(echo "$MID" | sed 's|/|_|g; s|https://||g; s|http://||g; s|:||g')
          echo "model_id=$MID" >> $GITHUB_OUTPUT
          echo "safe_name=$SAFE" >> $GITHUB_OUTPUT
          echo "key=vid-${SAFE}-$(date +%Y-%m)" >> $GITHUB_OUTPUT

      # ---- Cache model ----
      - name: 💾 Cache model
        uses: actions/cache@v4
        id: model-cache
        with:
          path: models/
          key: ${{ steps.cache-key.outputs.key }}
          restore-keys: |
            vid-${{ steps.cache-key.outputs.safe_name }}-

      # ---- Download model ----
      - name: 🧠 Download model
        if: steps.model-cache.outputs.cache-hit != 'true'
        env:
          MODEL_ID: ${{ steps.cache-key.outputs.model_id }}
          MODEL_SOURCE: ${{ github.event.inputs.model_source || 'huggingface' }}
          HF_TOKEN: ${{ secrets.HUGGINGFACE_TOKEN }}
          HF_HOME: /tmp/hf_cache
        run: |
          python scripts/download_model.py
          echo "Model size:"
          du -sh models/* 2>/dev/null || echo "(empty)"

      # ---- Model from cache ----
      - name: ✅ Model from cache
        if: steps.model-cache.outputs.cache-hit == 'true'
        run: |
          echo "Model from cache:"
          ls -la models/ | head -10
          du -sh models/* 2>/dev/null || echo "(empty)"

      # ---- Resolution preset ----
      - name: ⚙️ Resolution preset
        id: preset
        run: |
          case "${{ github.event.inputs.resolution || 'low' }}" in
            low)    echo "w=256" >> $GITHUB_OUTPUT; echo "h=256" >> $GITHUB_OUTPUT; echo "f=8"  >> $GITHUB_OUTPUT; echo "s=15" >> $GITHUB_OUTPUT ;;
            medium) echo "w=384" >> $GITHUB_OUTPUT; echo "h=384" >> $GITHUB_OUTPUT; echo "f=12" >> $GITHUB_OUTPUT; echo "s=20" >> $GITHUB_OUTPUT ;;
            high)   echo "w=576" >> $GITHUB_OUTPUT; echo "h=320" >> $GITHUB_OUTPUT; echo "f=16" >> $GITHUB_OUTPUT; echo "s=25" >> $GITHUB_OUTPUT ;;
          esac

      # ---- Start server ----
      - name: 🌐 Start server
        env:
          ALLOW_NSFW: "true"
          DEFAULT_NUM_FRAMES: ${{ steps.preset.outputs.f }}
          DEFAULT_WIDTH: ${{ steps.preset.outputs.w }}
          DEFAULT_HEIGHT: ${{ steps.preset.outputs.h }}
          DEFAULT_NUM_INFERENCE_STEPS: ${{ steps.preset.outputs.s }}
          DEVICE: cpu
        run: |
          mkdir -p outputs uploads

          nohup python -m uvicorn app.main:app \
            --host 0.0.0.0 --port 8000 \
            --workers 1 --log-level info \
            > server.log 2>&1 &

          echo "Waiting for server..."
          for i in $(seq 1 60); do
            if curl -s http://localhost:8000/api/system/health > /dev/null 2>&1; then
              echo "Server OK on port 8000"
              break
            fi
            sleep 2
          done

          if ! curl -s http://localhost:8000/api/system/health > /dev/null 2>&1; then
            echo "Server FAILED to start:"
            tail -30 server.log
            exit 1
          fi

      # ---- Start ngrok ----
      - name: 🌍 Start ngrok
        shell: bash
        env:
          NGROK_AUTH_TOKEN: ${{ secrets.NGROK_AUTH_TOKEN }}
        run: |
          set +e

          # Install ngrok via snap (most reliable on Ubuntu)
          which ngrok > /dev/null 2>&1 || {
            echo "Installing ngrok..."
            sudo snap install ngrok 2>/dev/null || {
              # Fallback: download binary
              curl -sSL https://bin.equinox.io/c/bNyj1mQVY4c/ngrok-v3-stable-linux-amd64.tgz | tar xz -C /tmp
              export PATH="/tmp:$PATH"
              chmod +x /tmp/ngrok
            }
          }

          # Verify ngrok is available
          which ngrok
          ngrok version

          # Verify server is listening
          curl -s http://localhost:8000/api/system/health > /dev/null 2>&1
          if [ $? -ne 0 ]; then
            echo "ERROR: Server not listening on port 8000!"
            exit 1
          fi
          echo "Server confirmed on port 8000"

          # Configure ngrok
          ngrok config add-authtoken "$NGROK_AUTH_TOKEN" 2>&1

          # Start ngrok
          echo "Starting ngrok http 8000..."
          ngrok http 8000 --log=stdout --log-format=logfmt > ngrok.log 2>&1 &
          NGROK_PID=$!
          echo "ngrok PID: $NGROK_PID"

          # Wait 5 seconds for ngrok to initialize
          sleep 5

          # Verify ngrok process is running
          if ! kill -0 $NGROK_PID 2>/dev/null; then
            echo "ERROR: ngrok process died immediately!"
            echo "=== ngrok log ==="
            cat ngrok.log
            exit 1
          fi
          echo "ngrok process is running"

          # Wait for tunnel
          echo "Waiting for tunnel URL..."
          TUNNEL=""
          for i in $(seq 1 30); do
            TUNNEL=$(curl -s http://localhost:4040/api/tunnels 2>/dev/null | jq -r '.tunnels[0].public_url' 2>/dev/null)
            if [ -n "$TUNNEL" ] && [ "$TUNNEL" != "null" ]; then
              echo "GOT IT: $TUNNEL"
              break
            fi
            TUNNEL=""

            # Check ngrok still alive
            if ! kill -0 $NGROK_PID 2>/dev/null; then
              echo "ngrok died at iteration $i"
              cat ngrok.log
              exit 1
            fi

            echo "  waiting... ($i/30)"
            sleep 2
          done

          set -e

          if [ -z "$TUNNEL" ]; then
            echo "=== NGROK TUNNEL FAILED ==="
            echo "=== ngrok.log ==="
            cat ngrok.log
            echo "=== processes ==="
            ps aux | grep ngrok || true
            echo "=== port check ==="
            ss -tlnp | grep -E '8000|4040' || true
            exit 1
          fi

          echo "PUBLIC_URL=$TUNNEL" >> $GITHUB_ENV
          echo "TUNNEL_URL=$TUNNEL" >> $GITHUB_ENV
          echo ""
          echo "============================================"
          echo "  LIVE: $TUNNEL"
          echo "============================================"

      # ---- Deployment report ----
      - name: 📊 Report
        run: |
          echo "## 🎬 AI Video Generator — LIVE" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 🌍 URL" >> $GITHUB_STEP_SUMMARY
          echo "**${TUNNEL_URL}**" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| 🖥️ | CPU-only GitHub runner |" >> $GITHUB_STEP_SUMMARY
          echo "| 🧠 | ${{ steps.cache-key.outputs.model_id }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 📐 | ${{ steps.preset.outputs.w }}×${{ steps.preset.outputs.h }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🎞️ | ${{ steps.preset.outputs.f }} frames |" >> $GITHUB_STEP_SUMMARY
          echo "| 🔁 | ${{ steps.preset.outputs.s }} steps |" >> $GITHUB_STEP_SUMMARY
          echo "| 🔞 | NSFW $ALLOW_NSFW |" >> $GITHUB_STEP_SUMMARY
          echo "| ⏱️ | Max 6h uptime |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "1. Open the URL above" >> $GITHUB_STEP_SUMMARY
          echo "2. Models tab → Load model" >> $GITHUB_STEP_SUMMARY
          echo "3. Create tab → Generate ⚡" >> $GITHUB_STEP_SUMMARY

      # ---- Keep alive (max 6h) ----
      - name: 💓 Keep alive
        timeout-minutes: 355
        shell: bash
        run: |
          set +e
          echo "Server live at: ${TUNNEL_URL}"
          N=0
          while [ $N -lt 210 ]; do
            N=$((N+1))
            sleep 90
            # Server health
            if ! curl -s http://localhost:8000/api/system/health > /dev/null 2>&1; then
              echo "Server down, restarting..."
              pkill -f "uvicorn app.main" 2>/dev/null || true
              sleep 2
              nohup python -m uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 1 --log-level info > server.log 2>&1 &
              sleep 5
            fi
            # Ngrok health
            if ! curl -s http://localhost:4040/api/tunnels > /dev/null 2>&1; then
              echo "Ngrok down, restarting..."
              pkill -f ngrok 2>/dev/null || true
              sleep 2
              ngrok http 8000 --log=stdout > ngrok.log 2>&1 &
              sleep 5
            fi
            echo "[$((N*90/60))m] alive"
          done
          echo "6h limit reached."

      # ---- Cleanup ----
      - name: 🧹 Cleanup
        if: always()
        run: |
          pkill -f "uvicorn app.main" 2>/dev/null || true
          pkill -f ngrok 2>/dev/null || true
